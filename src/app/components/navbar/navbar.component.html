<nav class="fixed top-0 left-0 right-0 z-50 border-b border-outline-variant bg-white/80 backdrop-blur-sm">
  <div
    class="mx-auto flex max-w-container-max items-center justify-between gap-2 px-3 py-3 sm:px-gutter sm:py-3 md:py-3">
    <div class="flex items-center gap-2 sm:gap-4">
      <button type="button" class="rounded p-2 transition hover:bg-surface-container md:hidden"
        (click)="toggleMobileMenu()" aria-label="Toggle menu">
        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
      <a class="logo text-xl font-bold md:font-normal font-headline-lg tracking-tight text-primary sm:text-2xl md:text-display-lg"
        routerLink="/">L'ELIXIR</a>
    </div>

    <nav class="hidden items-center gap-4 md:flex lg:gap-8">
      <div class="relative group">
        <a routerLink="/"
          class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors">Trang chủ</a>
        <div class="absolute left-0 top-full hidden group-hover:block bg-white shadow-lg rounded-lg min-w-[220px] z-50">
          <a routerLink="/about-us" class="block px-4 py-3 hover:bg-surface-container">Về chúng tôi</a>
          <a routerLink="/collection" class="block px-4 py-3 hover:bg-surface-container">Bộ sưu tập</a>
          <a routerLink="/support" class="block px-4 py-3 hover:bg-surface-container">Hỗ trợ</a>
        </div>
      </div>
      <div class="relative group">
        <a routerLink="/products"
          class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors">Sản phẩm</a>
        <div class="absolute left-0 top-full hidden group-hover:block bg-white shadow-lg rounded-lg min-w-[220px] z-50">
          <a *ngFor="let category of categories" [routerLink]="['/products']" [queryParams]="{ category: category }"
            class="block px-4 py-3 hover:bg-surface-container">{{ category }}</a>
        </div>
      </div>
      <a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors"
        routerLink="/survey">Khảo sát da</a>
      <a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors"
        routerLink="/recommendation">Quy trình của bạn</a>
    </nav>

    <div class="flex items-center gap-3 sm:gap-4">
      <a class="inline-flex items-center rounded-lg p-3 transition hover:bg-surface-container"
        routerLink="/products" aria-label="Search">
        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20L16.5 16.5"></path>
        </svg>
      </a>
      <a class="inline-flex items-center rounded-lg p-3 transition hover:bg-surface-container"
        [routerLink]="accountLink" aria-label="Account">
        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
          <path d="M5 20a7 7 0 0 1 14 0" stroke-linecap="round" />
        </svg>
      </a>
      <a class="inline-flex items-center rounded-lg p-3 transition hover:bg-surface-container"
        routerLink="/order-tracking" aria-label="Theo dõi đơn hàng" title="Theo dõi đơn hàng">
        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 22V12" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 12l8.73-5M12 12L3.27 7" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20 7v5l-8 4.6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <a class="relative inline-flex items-center rounded-lg p-3 transition hover:bg-surface-container"
        routerLink="/cart" aria-label="Cart">
        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 4h2l2.4 10.2a1 1 0 0 0 1 .8h8.7a1 1 0 0 0 1-.8L17.2 7H7" stroke-linecap="round"
            stroke-linejoin="round" />
          <circle cx="10" cy="19" r="1.2" fill="currentColor" stroke="none" />
          <circle cx="17" cy="19" r="1.2" fill="currentColor" stroke="none" />
        </svg>
        <span class="ml-1 rounded-full bg-primary px-2 text-sm text-white">{{ cartCount }}</span>
      </a>
    </div>
  </div>

  <div class="md:hidden" [class.hidden]="!mobileMenuOpen">
    <div class="flex flex-col gap-2 border-t border-outline-variant bg-white px-4 py-4 sm:px-gutter">
      <div>
        <div class="flex items-center justify-between rounded px-2 py-2">
          <a class="text-sm font-label-md text-on-surface-variant hover:text-primary transition-colors"
            routerLink="/" (click)="closeMobileMenu()">Trang chủ</a>
          <button type="button"
            class="inline-flex items-center rounded p-2 text-on-surface-variant hover:text-primary transition-colors"
            (click)="toggleMobileDropdown('home')" aria-label="Toggle home submenu">
            <svg class="h-4 w-4 shrink-0 transition-transform" [class.rotate-180]="mobileHomeDropdownOpen"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
        <div *ngIf="mobileHomeDropdownOpen"
          class="ml-3 mt-1 flex flex-col gap-1 border-l border-outline-variant pl-3 py-1">
          <a class="rounded px-2 py-2 text-sm font-label-md text-on-surface-variant hover:text-primary transition-colors"
            routerLink="/about-us" (click)="closeMobileMenu()">Về chúng tôi</a>
          <a class="rounded px-2 py-2 text-sm font-label-md text-on-surface-variant hover:text-primary transition-colors"
            routerLink="/collection" (click)="closeMobileMenu()">Bộ sưu tập</a>
          <a class="rounded px-2 py-2 text-sm font-label-md text-on-surface-variant hover:text-primary transition-colors"
            routerLink="/support" (click)="closeMobileMenu()">Hỗ trợ</a>
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between rounded px-2 py-2">
          <a class="text-sm font-label-md text-on-surface-variant hover:text-primary transition-colors"
            routerLink="/products" (click)="closeMobileMenu()">Sản phẩm</a>
          <button type="button"
            class="inline-flex items-center rounded p-2 text-on-surface-variant hover:text-primary transition-colors"
            (click)="toggleMobileDropdown('products')" aria-label="Toggle products submenu">
            <svg class="h-4 w-4 shrink-0 transition-transform" [class.rotate-180]="mobileProductsDropdownOpen"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
        <div *ngIf="mobileProductsDropdownOpen"
          class="ml-3 mt-1 flex max-h-56 flex-col gap-1 overflow-y-auto border-l border-outline-variant pl-3 py-1">
          <a *ngFor="let category of categories"
            class="rounded px-2 py-2 text-sm font-label-md text-on-surface-variant hover:text-primary transition-colors"
            [routerLink]="['/products']" [queryParams]="{ category: category }" (click)="closeMobileMenu()">{{
            category }}</a>
        </div>
      </div>

      <a class="rounded px-2 py-2 text-sm font-label-md text-on-surface-variant hover:text-primary transition-colors"
        routerLink="/survey" (click)="closeMobileMenu()">Khảo sát da</a>
      <a class="rounded px-2 py-2 text-sm font-label-md text-on-surface-variant hover:text-primary transition-colors"
        routerLink="/recommendation" (click)="closeMobileMenu()">Quy trình của bạn</a>
      <a class="rounded px-2 py-2 text-sm font-label-md text-on-surface-variant hover:text-primary transition-colors"
        routerLink="/order-tracking" (click)="closeMobileMenu()">Theo dõi đơn hàng</a>
    </div>
  </div>
</nav>
