<section class="max-w-2xl mx-auto px-gutter py-section-gap-mobile md:py-section-gap-desktop">
  <h1 class="font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface mb-8">Tài khoản của tôi</h1>

  <div *ngIf="user" class="bg-surface-container-low rounded-xl p-8 space-y-6">
    <div class="flex items-center gap-4">
      <span class="material-symbols-outlined text-primary text-5xl">account_circle</span>
      <div>
        <p class="font-headline-md text-headline-md text-on-surface">{{ user.fullName }}</p>
        <p class="text-on-surface-variant">{{ user.email }}</p>
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4 border-t border-outline-variant">
      <div>
        <p class="text-sm text-on-surface-variant">Số điện thoại</p>
        <p class="font-label-md">{{ user.phoneNumber || 'Chưa cập nhật' }}</p>
      </div>
      <div>
        <p class="text-sm text-on-surface-variant">Mã khách hàng</p>
        <p class="font-label-md">{{ user.userId }}</p>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row gap-4 pt-4">
      <a routerLink="/order-tracking" class="px-6 py-3 bg-primary text-white rounded-lg text-center hover:opacity-90 transition">
        Đơn hàng của tôi ({{ orderCount }})
      </a>
      <button type="button" (click)="logout()" class="px-6 py-3 border border-on-surface rounded-lg hover:bg-surface-container transition">
        Đăng xuất
      </button>
    </div>
  </div>
</section>
