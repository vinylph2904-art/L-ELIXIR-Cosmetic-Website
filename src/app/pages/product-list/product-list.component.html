<div class="max-w-container-max mx-auto px-gutter py-8">
  <nav class="flex items-center gap-2 text-label-sm text-outline mb-6">
    <a class="hover:text-primary" routerLink="/">Trang chủ</a>
    <span class="material-symbols-outlined text-[12px]">chevron_right</span>
    <span class="text-primary">Sản phẩm</span>
  </nav>

  <div class="flex gap-8 flex-col lg:flex-row">
    <aside class="w-full lg:w-80 shrink-0">
      <h3 class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-4">Lọc</h3>
      <div class="space-y-4">
        <div>
          <h4 class="font-label-md text-label-md mb-2">Danh mục</h4>
          <div class="space-y-2">
            <label class="flex items-center gap-2"><input type="checkbox" class="w-4 h-4"> Sữa rửa mặt</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="w-4 h-4"> Toner</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="w-4 h-4" checked> Serum</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="w-4 h-4"> Kem dưỡng</label>
          </div>
        </div>
        <div>
          <h4 class="font-label-md text-label-md mb-2">Loại da</h4>
          <div class="space-y-2">
            <label class="flex items-center gap-2"><input type="checkbox" class="w-4 h-4"> Da dầu</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="w-4 h-4"> Da khô</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="w-4 h-4"> Da hỗn hợp</label>
          </div>
        </div>
        <button class="w-full bg-primary-container text-on-primary-fixed py-3 rounded-lg font-label-md uppercase tracking-widest hover:opacity-90">Áp dụng</button>
      </div>
    </aside>

    <section class="flex-1">
      <div class="flex justify-between items-center mb-6">
        <span class="text-label-sm text-on-surface-variant">Hiển thị {{ products.length }} sản phẩm</span>
        <div class="flex items-center gap-4">
          <label class="font-label-sm text-outline uppercase">Sắp xếp:</label>
          <select class="bg-transparent border-b border-outline py-1 pr-4 outline-none">
            <option>Bán chạy nhất</option>
            <option>Mới nhất</option>
            <option>Giá thấp đến cao</option>
            <option>Giá cao đến thấp</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
        <article *ngFor="let product of products" class="group hover-zoom bg-surface-container-low rounded-xl overflow-hidden">
          <a [routerLink]="['/products', product.productId]" class="block aspect-[3/4]">
            <img [src]="product.images[0]" [alt]="product.name" class="w-full h-full object-cover">
          </a>
          <div class="p-4">
            <div class="text-label-sm text-primary">{{ product.categoryName }}</div>
            <h3 class="font-headline-md text-[18px] mt-2"><a [routerLink]="['/products', product.productId]">{{ product.name }}</a></h3>
            <div class="mt-3 flex items-center justify-between">
              <div class="font-label-sm">{{ product.price | currency:'VND':'symbol':'1.0-0' }}</div>
              <button (click)="addToCart(product)" class="text-primary hover:text-primary-container">Thêm vào giỏ</button>
            </div>
          </div>
        </article>
      </div>

      <div class="flex justify-center gap-2">
        <button class="px-4 py-2 border border-outline rounded hover:bg-primary hover:text-white">Trước</button>
        <button class="px-4 py-2 border border-primary bg-primary text-white rounded">1</button>
        <button class="px-4 py-2 border border-outline rounded hover:bg-primary hover:text-white">2</button>
        <button class="px-4 py-2 border border-outline rounded hover:bg-primary hover:text-white">3</button>
        <button class="px-4 py-2 border border-outline rounded hover:bg-primary hover:text-white">Sau</button>
      </div>
    </section>
  </div>
</div>
