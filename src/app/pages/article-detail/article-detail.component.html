<main class="pt-20 pb-20">
  <article *ngIf="currentArticle">
    <!-- Hero Image -->
    <section class="w-full h-[400px] md:h-[600px] overflow-hidden">
      <img 
        [src]="currentArticle.image" 
        [alt]="currentArticle.title"
        class="w-full h-full object-cover"
      />
    </section>

    <!-- Article Content -->
    <section class="max-w-4xl mx-auto px-margin-mobile md:px-gutter py-16 md:py-24">
      <!-- Meta Info -->
      <div class="mb-8">
        <span class="inline-block px-3 py-1 bg-primary text-on-primary font-label-sm text-label-sm rounded-full mb-4">
          {{ currentArticle.category }}
        </span>
        <p class="font-label-sm text-label-sm text-secondary">{{ currentArticle.date }}</p>
      </div>

      <!-- Title -->
      <h1 class="font-display-md text-display-md-mobile md:text-display-md text-on-surface mb-8">
        {{ currentArticle.title }}
      </h1>

      <!-- Excerpt -->
      <p class="font-body-lg text-on-surface-variant mb-12 pb-8 border-b border-outline-variant">
        {{ currentArticle.excerpt }}
      </p>

      <!-- Main Content -->
      <div class="prose prose-lg max-w-none font-body-md text-on-surface-variant mb-12" [innerHTML]="currentArticle.content">
      </div>

      <!-- CTA Button -->
      <div class="flex gap-4 flex-col md:flex-row">
        <a 
          [href]="currentArticle.productLink"
          target="_blank"
          class="inline-flex items-center justify-center gap-2 bg-primary text-on-primary px-8 py-4 font-label-md text-label-md rounded-lg hover:bg-primary/90 transition-colors"
        >
          Xem Bộ Sưu Tập
          <span class="material-symbols-outlined">arrow_forward</span>
        </a>
        <a 
          routerLink="/collection"
          class="inline-flex items-center justify-center gap-2 border border-primary text-primary px-8 py-4 font-label-md text-label-md rounded-lg hover:bg-primary/5 transition-colors"
        >
          Quay Lại
          <span class="material-symbols-outlined">arrow_back</span>
        </a>
      </div>
    </section>
  </article>

  <!-- Not Found -->
  <section *ngIf="!currentArticle" class="max-w-container-max mx-auto px-margin-mobile md:px-gutter py-24 text-center">
    <h1 class="font-display-md text-display-md text-on-surface mb-4">Bài viết không tìm thấy</h1>
    <p class="font-body-lg text-on-surface-variant mb-8">Xin lỗi, bài viết bạn tìm kiếm không tồn tại.</p>
    <a 
      routerLink="/collection"
      class="inline-flex items-center gap-2 bg-primary text-on-primary px-8 py-4 font-label-md text-label-md rounded-lg hover:bg-primary/90 transition-colors"
    >
      Quay Lại Tạp Chí
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
  </section>
</main>
